services:
  - type: web
    name: promise-insure-api
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn api_test_server.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: promise_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
        
databases:
  - name: promise_db
    plan: free
