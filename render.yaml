services:
  - type: web
    name: promise-insure-api
    env: python
    buildCommand: ./build.sh
    startCommand: bash ./start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: promise_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CARGO_HOME
        value: "/tmp/.cargo"
      - key: RUSTUP_HOME
        value: "/tmp/.rustup"
        
databases:
  - name: promise_db
    plan: free
